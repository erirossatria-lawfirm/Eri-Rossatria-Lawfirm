<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bisnis & Korporasi - Eri Rossatria Law Firm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .bg-navy { background-color: #0A1128; } /* Sesuaikan kode hex navy Anda */
        .text-gold { color: #C5A059; } /* Sesuaikan kode hex gold Anda */
    </style>
</head>
<body class="bg-white text-slate-900">
    <nav class="bg-navy p-6 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="flex flex-col">
                <span class="text-white font-serif text-xl">ERI ROSSATRIA</span>
                <span class="text-gold text-[10px] uppercase tracking-[0.3em]">Law Firm</span>
            </a>
            <a href="/" class="text-white text-xs uppercase tracking-widest border border-white/20 px-4 py-2 hover:bg-gold hover:text-navy transition-all">Kembali ke Beranda</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-20 px-6">
        <p class="text-gold uppercase tracking-[0.3em] text-xs font-bold mb-4">Edukasi Hukum</p>
        <h1 class="text-5xl font-serif text-navy mb-8">Bisnis & Korporasi</h1>
        
        <div class="prose prose-lg max-w-none text-slate-700 leading-relaxed">
            <p>Daftar artikel atau konten edukasi mengenai hukum bisnis akan muncul di sini...</p>
        </div>
    </main>
</body>
</html>
